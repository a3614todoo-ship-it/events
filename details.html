<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動詳情 | 藝境空間</title>
    <link rel="stylesheet" href="details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 返回按鈕組 -->
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <a href="index.html" class="back-link" style="margin-bottom: 0;">
                <i class="fas fa-arrow-left"></i> 返回活動列表
            </a>
            <span style="color: #e5e0d8;">|</span>
            <a href="https://a3614todoo-ship-it.github.io/rent/" class="back-link" style="margin-bottom: 0;">
                <i class="fas fa-home"></i> 返回租借空間
            </a>
        </div>

        <div class="event-detail-layout">
            <!-- 左側：詳細資訊 -->
            <div class="detail-main">
                <img id="eventImage" src="assets/hero_events_bg.png" class="detail-img" alt="活動海報">
                <h1 id="eventName" class="event-title">載入中...</h1>
                <div id="eventDescription" class="event-content">
                    正在準備精彩的活動內容，請稍候...
                </div>
            </div>

            <!-- 右側：報名側邊欄 -->
            <div class="reg-sidebar">
                <div class="reg-card">
                    <ul class="reg-info-list">
                        <li><i class="far fa-calendar-alt"></i> <span id="eventDate">...</span></li>
                        <li><i class="far fa-clock"></i> <span id="eventTime">...</span></li>
                        <li><i class="fas fa-map-marker-alt"></i> <span id="eventLocation">...</span></li>
                        <li><i class="fas fa-users"></i> 報名狀況：<span id="regStatus">載入中</span></li>
                    </ul>

                    <h3 class="form-title">觀眾報名表</h3>
                    <div id="fullNotice" class="full-notice">目前名額已滿，報名將自動進入候補名單。</div>
                    
                    <form id="regForm">
                        <div class="form-group">
                            <label for="userName">真實姓名</label>
                            <input type="text" id="userName" placeholder="請輸入姓名" required>
                        </div>
                        <div class="form-group">
                            <label for="userPhone">聯絡電話</label>
                            <input type="tel" id="userPhone" placeholder="請輸入手機號碼" required>
                        </div>
                        <div class="form-group">
                            <label for="userEmail">電子郵件</label>
                            <input type="email" id="userEmail" placeholder="用於接收報名確認信" required>
                        </div>
                        <button type="submit" id="submitBtn" class="btn-submit">確認報名</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 成功彈窗 (手繪藝術風版) -->
    <div id="successModal" style="display: none; position: fixed; inset: 0; background: rgba(74, 55, 40, 0.4); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: #ffffff; border-radius: 40px; max-width: 480px; width: 100%; padding: 50px; text-align: center; box-shadow: 0 40px 100px rgba(74, 55, 40, 0.2); border: 1px solid var(--border);">
            <div style="width: 100px; height: 100px; background: #fdfbf7; border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">
                <i class="fas fa-check" style="color: var(--accent); font-size: 40px;"></i>
            </div>
            <h2 id="successModalTitle" style="color: var(--text-main); margin-bottom: 20px; font-family: 'Noto Serif TC', serif; font-size: 2.2rem;">報名成功！</h2>
            <p id="successModalDesc" style="color: var(--text-muted); line-height: 1.8; margin-bottom: 40px; font-size: 1.1rem;">感謝您的參與，詳細資訊已發送至您的信箱。</p>
            <button onclick="closeSuccessModal()" style="width: 100%; padding: 18px; background: var(--text-main); border: none; border-radius: 50px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1.1rem;">
                返回活動列表
            </button>
        </div>
    </div>

    <script src="events.js"></script>
</body>
</html>
