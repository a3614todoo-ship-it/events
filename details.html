<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動詳情 | 藝境空間</title>
    <link rel="stylesheet" href="details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="event-header">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; margin-bottom: 20px; display: inline-block;">
                <i class="fas fa-arrow-left"></i> 返回活動列表
            </a>
            <h1 id="eventName">載入中...</h1>
        </header>

        <div class="event-main-content">
            <div class="event-image-section">
                <img id="eventImage" src="../assets/default_event.png" alt="活動海報">
                <div class="event-details-text">
                    <h2>活動詳情</h2>
                    <div id="eventDescription" class="description-box">
                        正在取得活動詳細資訊...
                    </div>
                </div>
            </div>

            <aside class="event-sidebar">
                <div class="info-item">
                    <i class="far fa-calendar-alt"></i> <span id="eventDate">載入中...</span>
                </div>
                <div class="info-item">
                    <i class="far fa-clock"></i> <span id="eventTime">載入中...</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i> <span id="eventLocation">載入中...</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-users"></i> 報名狀況：<span id="regStatus">0 / 0</span> 人
                </div>

                <!-- 報名表單區 -->
                <div id="registrationArea" class="registration-form">
                    <h3>觀眾報名表</h3>
                    <form id="regForm">
                        <div class="form-group">
                            <label>真實姓名</label>
                            <input type="text" id="userName" placeholder="請輸入姓名" required>
                        </div>
                        <div class="form-group">
                            <label>聯絡電話</label>
                            <input type="tel" id="userPhone" placeholder="請輸入手機號碼" required>
                        </div>
                        <div class="form-group">
                            <label>聯絡信箱</label>
                            <input type="email" id="userEmail" placeholder="系統將寄送通知信至此" required>
                        </div>
                        <div id="customFields"></div>
                        <button type="submit" class="btn-submit" id="submitBtn">確認報名</button>
                    </form>
                </div>
            </aside>
        </div>
    </div>

    <!-- 成功彈窗 (移植自定案版) -->
    <div id="successModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; max-width: 450px; width: 100%; padding: 40px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
            <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #10b981, #3b82f6); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);">
                <i class="fas fa-check" style="color: white; font-size: 35px;"></i>
            </div>
            <h2 id="successModalTitle" style="color: white; margin-bottom: 15px; font-family: 'Noto Serif TC', serif;">報名成功！</h2>
            <p id="successModalDesc" style="color: #94a3b8; line-height: 1.6; margin-bottom: 30px;">感謝您的參與，詳細資訊已發送至您的信箱。</p>
            <button onclick="closeSuccessModal()" style="width: 100%; padding: 15px; background: #8b5cf6; border: none; border-radius: 50px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s;">
                返回活動列表
            </button>
        </div>
    </div>

    <!-- 載入邏輯 -->
    <script src="events.js"></script>
</body>
</html>
